<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontak Kami - Budaya 5S</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        /* Reset dasar untuk margin dan padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'JetBrains Mono', -apple-system, monospace;
        }

        body {
            background-color: #020617; /* Hitam pekat / Slate 950 */
            /* Pola Tech-Grid Background */
            background-image: 
                linear-gradient(rgba(6, 182, 212, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            color: #e2e8f0; /* Teks abu-abu terang */
            line-height: 1.7;
        }

        /* Navigasi / Header */
        header {
            background-color: rgba(15, 23, 42, 0.8); /* Transparansi dengan backdrop-filter */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: white;
            padding: 0.8rem 8%; /* Disesuaikan agar vertikal logo seimbang */
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #06b6d4; /* Garis batas cyan solid */
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header .logo {
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #06b6d4;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        header .logo::before {
            content: "";
            color: #10b981; /* Hijau terminal */
            font-weight: 500;
            font-size: 1rem;
        }

        header nav {
            display: flex;
            align-items: center;
        }

        header nav a {
            color: #94a3b8;
            text-decoration: none;
            margin-left: 28px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.25s ease;
        }

        header nav a:hover, header nav a.active {
            color: #06b6d4; 
            text-shadow: 0 0 10px rgba(6, 182, 212, 0.5);
        }

        /* Style Logo SMKN 36 Jakarta */
        .school-logo {
            width: 42px;
            height: 42px;
            object-fit: contain;
            margin-left: 28px;
            border-radius: 6px;
            border: 1px solid rgba(6, 182, 212, 0.4);
            padding: 2px;
            background: rgba(15, 23, 42, 0.6);
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.3);
            transition: all 0.3s ease;
        }

        .school-logo:hover {
            border-color: #06b6d4;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.7);
            transform: scale(1.05);
        }

        /* Logo khusus kiri atas agar posisinya seimbang di dalam terminal navbar */
        .logo-left {
            margin-left: 6px;
            margin-right: 2px;
        }

        /* Kontainer Utama */
        .container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 24px;
            display: flex;
            gap: 35px;
            flex-wrap: wrap;
        }

        /* Bagian Konten Utama (Kiri) */
        .main-content {
            flex: 2.8;
            background: #0b1329; /* Card warna Navy Cyber */
            padding: 60px 40px 40px 40px;
            border-radius: 12px;
            border: 1px solid #06b6d4;
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.15);
            min-width: 320px;
            position: relative;
            overflow: hidden;
        }

        /* Indikator Window Terminal Mac/Linux Style */
        .main-content::before {
            content: "● ● ● core_framework.sh | active_node";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: #1e293b;
            padding: 8px 20px;
            font-size: 0.75rem;
            color: #38bdf8;
            font-weight: bold;
            border-bottom: 1px solid rgba(6, 182, 212, 0.2);
        }

        .main-content h2 {
            color: #ffffff;
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 25px;
            line-height: 1.3;
            letter-spacing: -0.5px;
            border-bottom: 1px solid rgba(6, 182, 212, 0.2);
            padding-bottom: 15px;
        }

        /* Kotak Kontak Tim (Highlight Box Style) */
        .contact-box {
            background: rgba(2, 6, 23, 0.6);
            border: 1px dashed rgba(16, 185, 129, 0.4);
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 35px;
        }

        .contact-box h4 {
            color: #10b981;
            font-size: 1.2rem;
            margin-bottom: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .contact-box ul {
            list-style: none;
            padding-left: 5px;
        }

        .contact-box ul li {
            color: #e2e8f0;
            font-size: 1.05rem;
            margin-bottom: 12px;
            position: relative;
            padding-left: 25px;
            font-weight: 500;
        }

        .contact-box ul li::before {
            content: "✦";
            position: absolute;
            left: 0;
            color: #06b6d4;
            text-shadow: 0 0 8px #06b6d4;
        }

        /* Tombol Kembali */
        .btn-back {
            display: inline-block;
            color: #10b981;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 700;
            padding: 10px 20px;
            background: rgba(16, 185, 129, 0.05);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 6px;
            transition: all 0.25s ease;
        }

        .btn-back:hover {
            color: #ffffff;
            background: #10b981;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
            transform: translateX(-4px);
        }

        /* Footer */
        footer {
            background-color: #020617;
            color: #475569;
            text-align: center;
            padding: 40px;
            width: 100%;
            margin-top: 80px;
            font-size: 0.85rem;
            font-weight: 500;
            border-top: 2px solid rgba(6, 182, 212, 0.1);
        }

        footer span {
            color: #10b981;
        }

        /* Responsif untuk perangkat mobile */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 15px;
                padding: 1.5rem;
            }
            header .logo {
                margin-bottom: 5px;
            }
            header nav {
                justify-content: center;
                width: 100%;
            }
            header nav a {
                margin: 0 10px;
            }
            .school-logo {
                margin-left: 10px;
            }
            .container {
                margin: 20px auto;
            }
            .main-content {
                padding: 50px 24px 30px 24px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <img src="cropped-smkn-36-jakarta-logo-2.webp" alt="Logo SMKN 36 Jakarta" class="school-logo logo-left">
            Budaya 5S
        </div>
        <nav>
            <a href="index.html">// Beranda</a>
            <a href="#" class="active">// Kontak</a>
            <img src="logotkjsmkn36.png" alt="Logo SMKN 36 Jakarta" class="school-logo">
        </nav>
    </header>

    <div class="container">
        <main class="main-content">
            <h2>Kontak Kelompok Mikrotik</h2>
            
            <div class="contact-box">
                <h4>Anggota Tim:</h4>
                <ul>
                    <li>Mohammad Paisyal</li>
                    <li>Diah Ajeng Syahrani</li>
                    <li>Wulan Divany</li>
                    <li>Ghazi Pradipta</li>
                </ul>
            </div>
            
            <a href="index.html" class="btn-back">← Kembali ke Beranda</a>
        </main>
    </div>

    <footer>
        <p>&copy; 2026 Kelompok Mikrotik. <span>SMK Negeri 36 Jakarta</span>. Connection status: SECURE_</p>
    </footer>
</body>
</html>
